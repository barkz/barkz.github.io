<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WUBU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .logo {
            display: flex;
            gap: 20px;
        }

        .block {
            width: 120px;
            height: 120px;
            background-color: #C8A2E8;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }

        .block span {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="block"><span>W</span></div>
        <div class="block"><span>U</span></div>
        <div class="block"><span>B</span></div>
        <div class="block"><span>U</span></div>
    </div>
</body>
</html>
