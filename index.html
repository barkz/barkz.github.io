<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WUBU</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 250px;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }

        .logo {
            display: flex;
            gap: 8px;
        }

        .block {
            width: 120px;
            height: 120px;
            background-color: #9668C2;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }

        .block span {
            font-family: 'Press Start 2P', cursive;
            font-size: 58px;
            font-weight: 700;
            color: #ffffff;
            user-select: none;
        }

        .tagline {
            text-align: center;
            margin-top: 50px;
            font-size: 16px;
            color: #666;
            letter-spacing: 1px;
        }

        .last-block {
            position: relative;
        }

        .ai-badge {
            position: absolute;
            bottom: -28px;
            right: -28px;
            width: 56px;
            height: 56px;
            background-color: #000000;
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo">
            <div class="block"><span>W</span></div>
            <div class="block"><span>U</span></div>
            <div class="block"><span>B</span></div>
            <div class="block last-block">
                <span>U</span>
                <div class="ai-badge">.ai</div>
            </div>
        </div>
    </div>
    <p class="tagline">building macOS utilities that I've always wanted</p>
    <footer>&copy; 2026 WuBu, LLC. All rights reserved.</footer>
</body>
</html>
