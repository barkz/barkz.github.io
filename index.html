<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WuBu, LLC -- creating macOS utilities & iPhone games</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -50px;
        }

        /* === TETRIS SCENE === */
        .scene {
            position: relative;
            width: 640px;
            height: 520px;
        }

        .cell {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255,255,255,0.08);
            border-top-color: rgba(255,255,255,0.22);
            border-left-color: rgba(255,255,255,0.16);
            border-bottom-color: rgba(0,0,0,0.4);
            border-right-color: rgba(0,0,0,0.35);
        }

        .letter-block {
            position: absolute;
            width: 120px;
            height: 120px;
            background: #5B2D8E;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: rgba(255,255,255,0.3);
            border-left-color: rgba(255,255,255,0.25);
            border-bottom-color: rgba(0,0,0,0.4);
            border-right-color: rgba(0,0,0,0.4);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            z-index: 2;
        }

        .letter-block span {
            font-family: 'Press Start 2P', cursive;
            font-size: 58px;
            color: #fff;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.5);
        }

        .block-w { left: 70px; top: 200px; }
        .block-u1 { left: 198px; top: 200px; }
        .block-b { left: 326px; top: 200px; }
        .block-u2 { left: 454px; top: 200px; }

        .c1 { background: #7B3FBF; }
        .c2 { background: #9668C2; }
        .c3 { background: #C49EEF; }
        .c4 { background: #4A1F7A; }

        /* Bridge between W and U1 */
        .bw1 { left: 160px; top: 200px; } .bw2 { left: 160px; top: 230px; }
        .bw3 { left: 190px; top: 200px; } .bw4 { left: 190px; top: 230px; }

        /* Bridge between U1 and B */
        .bb1 { left: 288px; top: 260px; } .bb2 { left: 288px; top: 290px; }
        .bb3 { left: 318px; top: 260px; } .bb4 { left: 318px; top: 290px; }

        /* Bridge between B and U2 */
        .bc1 { left: 416px; top: 200px; } .bc2 { left: 416px; top: 230px; }
        .bc3 { left: 446px; top: 200px; } .bc4 { left: 446px; top: 230px; }

        /* T-piece on W */
        .tw1 { left: 70px; top: 170px; } .tw2 { left: 100px; top: 170px; }
        .tw3 { left: 130px; top: 170px; } .tw4 { left: 100px; top: 140px; }

        /* L-piece on U1 */
        .tu1 { left: 198px; top: 170px; } .tu2 { left: 228px; top: 170px; }
        .tu3 { left: 228px; top: 140px; } .tu4 { left: 228px; top: 110px; }

        /* S-piece on B */
        .tb1 { left: 356px; top: 140px; } .tb2 { left: 386px; top: 140px; }
        .tb3 { left: 326px; top: 170px; } .tb4 { left: 356px; top: 170px; }

        /* I-piece on U2 */
        .tu21 { left: 484px; top: 50px; } .tu22 { left: 484px; top: 80px; }
        .tu23 { left: 484px; top: 110px; } .tu24 { left: 484px; top: 140px; }

        /* O-piece high above */
        .to1 { left: 280px; top: 50px; } .to2 { left: 310px; top: 50px; }
        .to3 { left: 280px; top: 80px; } .to4 { left: 310px; top: 80px; }

        /* J-piece under W */
        .dw1 { left: 100px; top: 320px; } .dw2 { left: 100px; top: 350px; }
        .dw3 { left: 70px; top: 350px; } .dw4 { left: 130px; top: 320px; }

        /* Z-piece under U1 */
        .du1 { left: 198px; top: 320px; } .du2 { left: 228px; top: 320px; }
        .du3 { left: 228px; top: 350px; } .du4 { left: 258px; top: 350px; }

        /* T-piece under B */
        .db1 { left: 326px; top: 320px; } .db2 { left: 356px; top: 320px; }
        .db3 { left: 386px; top: 320px; } .db4 { left: 356px; top: 350px; }

        /* L-piece under U2 */
        .du21 { left: 484px; top: 320px; } .du22 { left: 484px; top: 350px; }
        .du23 { left: 484px; top: 380px; } .du24 { left: 514px; top: 380px; }

        /* Bottom connectors */
        .dc1 { left: 160px; top: 350px; } .dc2 { left: 160px; top: 380px; }
        .dc3 { left: 290px; top: 380px; } .dc4 { left: 320px; top: 380px; }
        .dc5 { left: 416px; top: 350px; } .dc6 { left: 446px; top: 350px; }

        /* Side wings - left */
        .sl1 { left: 10px; top: 200px; } .sl2 { left: 40px; top: 200px; }
        .sl3 { left: 10px; top: 230px; } .sl4 { left: 40px; top: 230px; }
        .sl5 { left: 10px; top: 260px; } .sl6 { left: 40px; top: 260px; }
        .sl7 { left: 40px; top: 290px; }

        /* Side wings - right */
        .sr1 { left: 574px; top: 200px; } .sr2 { left: 604px; top: 200px; }
        .sr3 { left: 574px; top: 230px; } .sr4 { left: 604px; top: 230px; }
        .sr5 { left: 574px; top: 260px; } .sr6 { left: 604px; top: 260px; }
        .sr7 { left: 574px; top: 290px; }

        .ai-badge {
            position: absolute;
            left: 518px;
            top: 288px;
            width: 56px;
            height: 56px;
            background: #000;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: rgba(255,255,255,0.35);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            color: #fff;
            z-index: 3;
        }

        /* === CAROUSEL === */
        .carousel {
            width: 100%;
            max-width: 720px;
            margin: 20px auto 40px;
            padding: 0 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #1a0a1f;
            border: 2px solid rgba(150, 104, 194, 0.25);
            border-top-color: rgba(255, 255, 255, 0.15);
            border-left-color: rgba(255, 255, 255, 0.12);
            border-bottom-color: rgba(0, 0, 0, 0.5);
            border-right-color: rgba(0, 0, 0, 0.5);
        }

        .carousel-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.6s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            pointer-events: none;
        }

        .carousel-slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        .carousel-slide img,
        .slide-image {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #4A1F7A, #7B3FBF);
        }

        .slide-text {
            color: #c4c4c4;
            font-size: 14px;
            text-align: center;
            letter-spacing: 1px;
            max-width: 480px;
            line-height: 1.5;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
        }

        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(150, 104, 194, 0.3);
            border: none;
            padding: 0;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .carousel-dot:hover {
            background: #C49EEF;
        }

        .carousel-dot.active {
            background: #9668C2;
            transform: scale(1.2);
        }

        /* === TAGLINE & FOOTER === */
        .tagline {
            position: absolute;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            text-align: center;
            font-size: 16px;
            color: #888;
            letter-spacing: 1px;
        }

        .site-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            padding: 18px 20px;
            border-top: 2px solid rgba(123, 63, 191, 0.2);
        }

        .site-nav a {
            font-size: 13px;
            color: #9668C2;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .site-nav a:hover {
            color: #C49EEF;
            text-decoration: underline;
        }

        .site-nav a.current {
            color: #C49EEF;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }

        footer a {
            color: #9668C2;
            text-decoration: none;
            display: block;
            margin-top: 8px;
        }

        footer a:hover {
            color: #C49EEF;
            text-decoration: underline;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .logo-container {
                margin-top: 0;
            }
            .scene {
                transform: scale(0.6);
                transform-origin: center center;
                height: 520px;
            }
            .tagline {
                font-size: 13px;
                bottom: 50px;
            }
            .carousel {
                margin: 0 auto 30px;
            }
            .slide-text {
                font-size: 13px;
            }
            .site-nav { gap: 16px; font-size: 12px; }
            footer {
                font-size: 12px;
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .logo-container {
                margin-top: 0;
            }
            .scene {
                transform: scale(0.55);
                transform-origin: center center;
            }
            .tagline {
                font-size: 12px;
                bottom: 45px;
                white-space: normal;
                width: 580px;
            }
            footer {
                font-size: 11px;
                padding: 8px;
            }
        }

        @media (max-width: 375px) {
            .scene {
                transform: scale(0.5);
                transform-origin: center center;
            }
            .tagline {
                font-size: 11px;
                bottom: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="scene">
            <!-- Top pieces -->
            <div class="cell c2 tw1"></div><div class="cell c2 tw2"></div><div class="cell c2 tw3"></div><div class="cell c2 tw4"></div>
            <div class="cell c1 tu1"></div><div class="cell c1 tu2"></div><div class="cell c1 tu3"></div><div class="cell c1 tu4"></div>
            <div class="cell c3 tb1"></div><div class="cell c3 tb2"></div><div class="cell c3 tb3"></div><div class="cell c3 tb4"></div>
            <div class="cell c2 tu21"></div><div class="cell c2 tu22"></div><div class="cell c2 tu23"></div><div class="cell c2 tu24"></div>
            <div class="cell c4 to1"></div><div class="cell c4 to2"></div><div class="cell c4 to3"></div><div class="cell c4 to4"></div>

            <!-- Bridge pieces -->
            <div class="cell c4 bw1"></div><div class="cell c4 bw2"></div><div class="cell c4 bw3"></div><div class="cell c4 bw4"></div>
            <div class="cell c1 bb1"></div><div class="cell c1 bb2"></div><div class="cell c1 bb3"></div><div class="cell c1 bb4"></div>
            <div class="cell c4 bc1"></div><div class="cell c4 bc2"></div><div class="cell c4 bc3"></div><div class="cell c4 bc4"></div>

            <!-- Side wings left -->
            <div class="cell c1 sl1"></div><div class="cell c1 sl2"></div><div class="cell c4 sl3"></div><div class="cell c4 sl4"></div>
            <div class="cell c1 sl5"></div><div class="cell c1 sl6"></div><div class="cell c4 sl7"></div>

            <!-- Side wings right -->
            <div class="cell c1 sr1"></div><div class="cell c1 sr2"></div><div class="cell c4 sr3"></div><div class="cell c4 sr4"></div>
            <div class="cell c1 sr5"></div><div class="cell c1 sr6"></div><div class="cell c4 sr7"></div>

            <!-- Main letter blocks -->
            <div class="letter-block block-w"><span>W</span></div>
            <div class="letter-block block-u1"><span>U</span></div>
            <div class="letter-block block-b"><span>B</span></div>
            <div class="letter-block block-u2"><span>U</span></div>

            <!-- Bottom pieces -->
            <div class="cell c3 dw1"></div><div class="cell c3 dw2"></div><div class="cell c3 dw3"></div><div class="cell c3 dw4"></div>
            <div class="cell c4 du1"></div><div class="cell c4 du2"></div><div class="cell c4 du3"></div><div class="cell c4 du4"></div>
            <div class="cell c2 db1"></div><div class="cell c2 db2"></div><div class="cell c2 db3"></div><div class="cell c2 db4"></div>
            <div class="cell c1 du21"></div><div class="cell c1 du22"></div><div class="cell c1 du23"></div><div class="cell c1 du24"></div>

            <!-- Bottom connectors -->
            <div class="cell c2 dc1"></div><div class="cell c2 dc2"></div>
            <div class="cell c3 dc3"></div><div class="cell c3 dc4"></div>
            <div class="cell c2 dc5"></div><div class="cell c2 dc6"></div>

            <div class="ai-badge">.ai</div>
            <p class="tagline">building macOS utilities that I've always wanted</p>
        </div>
    </div>

    <div class="carousel">
        <div class="carousel-track">
            <div class="carousel-slide active">
                <div class="slide-image"></div>
                <p class="slide-text">Slide one &mdash; add a photo and a short description here.</p>
            </div>
            <div class="carousel-slide">
                <div class="slide-image" style="background: linear-gradient(135deg, #5B2D8E, #9668C2);"></div>
                <p class="slide-text">Slide two &mdash; another project, another short line of text.</p>
            </div>
            <div class="carousel-slide">
                <div class="slide-image" style="background: linear-gradient(135deg, #7B3FBF, #C49EEF);"></div>
                <p class="slide-text">Slide three &mdash; keep things brief and on brand.</p>
            </div>
        </div>
        <div class="carousel-dots">
            <button class="carousel-dot active" type="button" aria-label="Slide 1"></button>
            <button class="carousel-dot" type="button" aria-label="Slide 2"></button>
            <button class="carousel-dot" type="button" aria-label="Slide 3"></button>
        </div>
    </div>

    <script>
        (function () {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            let current = 0;
            let timer;

            function show(index) {
                slides.forEach((s, i) => s.classList.toggle('active', i === index));
                dots.forEach((d, i) => d.classList.toggle('active', i === index));
                current = index;
            }

            function next() {
                show((current + 1) % slides.length);
            }

            function start() {
                timer = setInterval(next, 6000);
            }

            dots.forEach((dot, i) => {
                dot.addEventListener('click', () => {
                    clearInterval(timer);
                    show(i);
                    start();
                });
            });

            start();
        })();
    </script>

    <nav class="site-nav">
        <a href="index.html" class="current">Home</a>
        <a href="who.html">Who is WuBu</a>
        <a href="support.html">Support</a>
        <a href="privacy.html">Privacy</a>
    </nav>

    <footer>&copy; 2026 WuBu, LLC. All rights reserved.</footer>
</body>
</html>
